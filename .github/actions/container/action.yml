name: Build Docker image
description: Login, build, optionally test, push and attest a Docker image

inputs:
  registry:
    description: Container registry domain
    required: false
    default: ghcr.io
  image-name:
    description: Full image name (without registry)
    required: true
  containerfile:
    description: Path to the Containerfile
    required: true
  context:
    description: Build context
    required: false
    default: .
  push:
    description: Whether to push the image and create an attestation
    required: false
    default: "false"
  run-e2e:
    description: Whether to run e2e tests after building
    required: false
    default: "false"
  base-image:
    description: Base image version
    required: false
    default: "main"
  github-actor:
    description: Actor used for registry login
    required: true
  github-token:
    description: Token used for registry login
    required: true

outputs:
  tags:
    description: Tags produced by the metadata step
    value: ${{ steps.meta.outputs.tags }}
  digest:
    description: Digest of the pushed image
    value: ${{ steps.push.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Log in to the Container registry
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.github-actor }}
        password: ${{ inputs.github-token }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.registry }}/${{ inputs.image-name }}

    # Local build first (needed for e2e tests before pushing)
    - name: Build Docker image (local)
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.containerfile }}
        push: false
        load: true
        tags: local/test:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          BASE_IMAGE_VERSION=${{inputs.base-image}}

    - name: Run e2e tests
      if: inputs.run-e2e == 'true'
      shell: bash
      run: |
        docker run --rm -w /opt/picuscan \
          --env GIT_AUTHOR_NAME="Max Mustermann" \
          --env GIT_AUTHOR_EMAIL="max.mustermann@example.com" \
          --env GIT_COMMITTER_NAME="Max Mustermann" \
          --env GIT_COMMITTER_EMAIL="max.mustermann@example.com" \
          --entrypoint uv local/test:${{ github.sha }} run pytest --e2e

    - name: Build and push Docker image
      id: push
      if: inputs.push == 'true'
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.containerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Generate artifact attestation
      if: inputs.push == 'true'
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ${{ inputs.registry }}/${{ inputs.image-name }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true