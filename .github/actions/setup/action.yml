name: setup
description: Installs the project
inputs:
  python-version:
    description: Python version that should be installed.
    required: false

runs:
  using: composite
  env:
    LLVM_CONFIG: /usr/bin/llvm-config-14
  steps:
    - name: Install llvm 14
      shell: bash
      run: |
        sudo apt update
        sudo apt install --no-install-recommends -y software-properties-common
        sudo add-apt-repository -y "deb http://cz.archive.ubuntu.com/ubuntu questing main universe"
        sudo apt install --no-install-recommends -y  llvm-14
    - name: Install uv and Python ${{ inputs.python-version }}
      if: ${{ inputs.python-version != '' }}
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ inputs.python-version }}

    - name: Install uv and Python default
      if: ${{ inputs.python-version == '' }}
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install the project
      shell: bash
      run: |
        uv sync --locked --all-extras --dev
