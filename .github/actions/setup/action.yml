name: setup
description: Installs the project
inputs:
  python-version:
    description: Python version that should be installed.
    required: false

runs:
  using: composite
  steps:
    - name: Install llvm 14
      shell: bash
      run: |
        sudo apt update
        sudo apt install --no-install-recommends -y software-properties-common git
        sudo add-apt-repository -y "deb http://cz.archive.ubuntu.com/ubuntu questing main universe"
        sudo apt install --no-install-recommends -y  llvm-14 llvm-14-dev
        sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-14 1
        sudo update-alternatives --set llvm-config /usr/bin/llvm-config-14

    - name: Install uv and Python ${{ inputs.python-version }}
      if: ${{ inputs.python-version != '' }}
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ inputs.python-version }}

    - name: Install uv and Python default
      if: ${{ inputs.python-version == '' }}
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install the project
      shell: bash
      run: |
        uv sync --locked --all-extras --dev
